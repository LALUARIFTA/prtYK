<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Stormbreaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: 0 0% 3.9%;
            --foreground: 0 0% 98%;
            --primary: 37.7 92.1% 50.2%;
            --border: 0 0% 14.9%;
            --ring: 37.7 92.1% 50.2%;
        }
        body {
            background-color: #09090b;
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: #09090b;
            border: 1px solid #27272a;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 0.75rem;
        }
        input {
            background: transparent;
            border: 1px solid #27272a;
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }
        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #e4e4e7;
        }
        .btn-primary {
            background-color: #fafafa;
            color: #09090b;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            width: 100%;
            margin-top: 1.5rem;
            transition: opacity 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 1px solid #27272a;
            color: #fafafa;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            width: 100%;
            margin-top: 0.75rem;
            cursor: pointer;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <!-- Header from Demo -->
        <div class="flex flex-col items-center gap-2 mb-6">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-[#27272a]">
                <svg class="stroke-zinc-100" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="12" fill="none" stroke-width="4" />
                </svg>
            </div>
            <div class="text-center">
                <h2 class="text-lg font-semibold tracking-tight text-white">Welcome back</h2>
                <p class="text-sm text-zinc-400">Enter your credentials to access the vault.</p>
            </div>
        </div>

        <form id="loginForm" class="space-y-4">
            <div id="errorBox" class="error-msg">Invalid credentials. Access denied.</div>
            
            <div>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="admin@example.com" required>
            </div>

            <div>
                <div class="flex justify-between items-center">
                    <label for="password">Password</label>
                    <a href="#" class="text-sm underline hover:no-underline text-zinc-400">Forgot?</a>
                </div>
                <input id="password" type="password" placeholder="••••••••" required>
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" id="remember" style="width: auto; margin-top: 0;" class="accent-[#f59e0b]">
                <label for="remember" class="font-normal text-zinc-400">Remember me</label>
            </div>

            <button type="submit" id="loginBtn" class="btn-primary">Sign in</button>
        </form>

        <div class="flex items-center gap-3 my-6 before:h-px before:flex-1 before:bg-[#27272a] after:h-px after:flex-1 after:bg-[#27272a]">
            <span class="text-xs text-zinc-500 uppercase font-mono">Or</span>
        </div>

        <button type="button" class="btn-outline" onclick="window.location.href='../index.html'">Return to System</button>
    </div>

    <script src="../assets/js/supabase_lib.js"></script>
    <script>
        const SUPABASE_URL = 'https://abrxshzkgshklgmaztlp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_EGPAkhdoARUwWv7Q2K2gVw_3PnwahcQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.getElementById('loginForm');
        const errorBox = document.getElementById('errorBox');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            loginBtn.innerText = 'AUTHENTICATING...';
            loginBtn.disabled = true;
            errorBox.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorBox.innerText = error.message;
                errorBox.style.display = 'block';
                loginBtn.innerText = 'Sign in';
                loginBtn.disabled = false;
            } else {
                loginBtn.innerText = 'ACCESS GRANTED';
                setTimeout(() => window.location.href = 'index.html', 800);
            }
        };
    </script>
</body>
</html>
